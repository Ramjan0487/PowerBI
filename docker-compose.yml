version: "3.9"
services:
  app:
    build: { context: ., dockerfile: Dockerfile, target: production }
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql://cms:${DB_PASSWORD}@postgres:5432/cms
      - REDIS_URL=redis://redis:6379/0
      - MAIL_SERVER=${MAIL_SERVER}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_FROM_NUMBER=${TWILIO_FROM_NUMBER}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CMS_API_KEY=${CMS_API_KEY}
      - POWERBI_CLIENT_ID=${POWERBI_CLIENT_ID}
      - POWERBI_CLIENT_SECRET=${POWERBI_CLIENT_SECRET}
      - POWERBI_TENANT_ID=${POWERBI_TENANT_ID}
      - POWERBI_WORKSPACE_ID=${POWERBI_WORKSPACE_ID}
      - MTLS_CA_CERT=/app/certs/ca/ca.crt
      - MTLS_SERVER_CERT=/app/certs/server/server.crt
      - MTLS_SERVER_KEY=/app/certs/server/server.key
      - VERIFY_CLIENT_CERT=true
    volumes:
      - ./certs:/app/certs:ro
      - uploads_data:/app/uploads
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    networks: [cms_net]
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:5000/api/v1/health"]
      interval: 30s; timeout: 10s; retries: 3

  worker:
    build: { context: ., dockerfile: Dockerfile, target: production }
    restart: unless-stopped
    command: celery -A app.services.notifications.notification_service.celery_app worker --beat --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://cms:${DB_PASSWORD}@postgres:5432/cms
      - MAIL_SERVER=${MAIL_SERVER}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_FROM_NUMBER=${TWILIO_FROM_NUMBER}
    depends_on: [redis, postgres]
    networks: [cms_net]

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports: ["80:80","443:443"]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on: [app]
    networks: [cms_net]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment: { POSTGRES_USER: cms, POSTGRES_PASSWORD: "${DB_PASSWORD}", POSTGRES_DB: cms }
    volumes: [pg_data:/var/lib/postgresql/data]
    networks: [cms_net]
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U cms"]
      interval: 10s; timeout: 5s; retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes: [redis_data:/data]
    networks: [cms_net]
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s; timeout: 5s; retries: 5

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./ci/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports: ["9090:9090"]
    networks: [cms_net]

  grafana:
    image: grafana/grafana:10.4.0
    environment: ["GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-cms2024}"]
    volumes: [grafana_data:/var/lib/grafana]
    ports: ["3000:3000"]
    depends_on: [prometheus]
    networks: [cms_net]

volumes: { pg_data: {}, redis_data: {}, uploads_data: {}, prometheus_data: {}, grafana_data: {} }
networks: { cms_net: { driver: bridge } }
