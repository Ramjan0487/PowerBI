<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ContractIQ — Reset Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body class="auth-body">
<div class="auth-center">
  <div class="auth-card">
    <div class="brand brand-center">
      <div class="brand-icon">◈</div>
      <div class="brand-name">ContractIQ</div>
    </div>
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-size:48px;margin-bottom:12px">🔑</div>
      <h2>Forgot your password?</h2>
      <p class="form-sub">Enter your email and we'll send a reset link.</p>
    </div>

    <div class="alert alert-error hidden"   id="formError"></div>
    <div class="alert alert-success hidden" id="formSuccess"></div>

    <form id="forgotForm" novalidate>
      <div class="field">
        <label>Email address</label>
        <input type="email" id="email" name="email" placeholder="you@company.com" required>
      </div>
      <button type="submit" class="btn-submit" id="submitBtn">
        <span id="btnTxt">Send Reset Link</span>
        <span class="btn-spinner hidden" id="btnSpin"></span>
      </button>
    </form>

    <p class="auth-link" style="text-align:center;margin-top:20px">
      <a href="{{ url_for('auth.login') }}">← Back to sign in</a>
    </p>
  </div>
</div>
<script>
document.getElementById('forgotForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  document.getElementById('btnTxt').textContent = 'Sending…';
  document.getElementById('btnSpin').classList.remove('hidden');
  document.getElementById('submitBtn').disabled = true;
  const email = document.getElementById('email').value.trim();
  try {
    const res  = await fetch('/auth/forgot-password', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ email })
    });
    const data = await res.json();
    document.getElementById('formSuccess').textContent = data.message;
    document.getElementById('formSuccess').classList.remove('hidden');
    document.getElementById('forgotForm').style.display = 'none';
  } catch {
    document.getElementById('formError').textContent = 'Network error. Try again.';
    document.getElementById('formError').classList.remove('hidden');
  } finally {
    document.getElementById('btnTxt').textContent = 'Send Reset Link';
    document.getElementById('btnSpin').classList.add('hidden');
    document.getElementById('submitBtn').disabled = false;
  }
});
</script>
</body></html>
