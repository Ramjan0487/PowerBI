name: CMS CI/CD Pipeline

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 5'   # Every Friday 08:00 — reminder system health check

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/cms-app

jobs:
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - run: pip install ruff mypy
      - run: ruff check app/ tests/ wsgi.py
      - run: mypy app/ --ignore-missing-imports
        continue-on-error: true

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.11","3.12"]
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
      postgres:
        image: postgres:16-alpine
        ports: ["5432:5432"]
        env:
          POSTGRES_USER: cms
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: cms_test
        options: --health-cmd "pg_isready -U cms" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ matrix.python-version }}", cache: pip }
      - run: sudo apt-get update && sudo apt-get install -y libgl1 libglib2.0-0
      - run: pip install -r requirements.txt
      - name: Run tests
        env:
          FLASK_ENV: testing
          SECRET_KEY: ci-secret-key
          DATABASE_URL: postgresql://cms:testpass@localhost:5432/cms_test
          REDIS_URL: redis://localhost:6379/0
          VERIFY_CLIENT_CERT: "false"
          MAIL_SUPPRESS_SEND: "true"
          CMS_API_KEY: test-api-key
        run: pytest tests/ -v --tb=short --cov=app --cov-report=xml --junitxml=test-results.xml
      - uses: codecov/codecov-action@v4
        with: { file: coverage.xml }
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results.xml

  katalon:
    name: Katalon TestOps
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Run Katalon via Docker
        run: |
          docker run --rm \
            -v $(pwd)/katalon:/katalon \
            -e KATALON_API_KEY=${{ secrets.KATALON_API_KEY }} \
            katalonstudio/katalon \
            katalonc.sh -projectPath="/katalon" \
              -browserType="Chrome (headless)" \
              -retry=0 -statusDelay=15 \
              -testSuiteCollectionPath="Test Suites/CMS_Full_TestSuite" \
              -apiKey="${{ secrets.KATALON_API_KEY }}"
        continue-on-error: true

  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - run: pip install bandit safety
      - run: bandit -r app/ -ll -ii
        continue-on-error: true
      - run: safety check -r requirements.txt
        continue-on-error: true

  docker-build:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  friday-health-check:
    name: Friday reminder system health
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Ping production health endpoint
        run: |
          curl --fail https://${{ secrets.PROD_HOST }}/api/v1/health \
            -H "X-API-Key: ${{ secrets.CMS_API_KEY }}" || echo "Health check failed"
      - name: Verify Celery beat is alive
        run: echo "Reminder worker health check — add Celery ping here"

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key:      ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/cms
            docker compose pull app worker
            docker compose up -d --no-deps app worker
            docker image prune -f
            echo "Deployed $(date)"
